<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnderLight | Sau Ánh Hào Quang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Fira+Code&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #05070a; color: #e2e8f0; overflow-x: hidden; }
        .serif-font { font-family: 'Playfair Display', serif; }
        .code-font { font-family: 'Fira Code', monospace; }
        .shimmer-text {
            background: linear-gradient(to right, #b45309 20%, #fde68a 50%, #b45309 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer { to { background-position: 200% center; } }
        .actor-card { transition: all 0.5s ease; border: 1px solid #1e293b; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(10px); }
        .actor-card:hover { border-color: #f59e0b; transform: translateY(-8px); }
        .actor-card img { transition: transform 1s ease, filter 0.8s ease; width: 100%; height: 100%; object-fit: cover; }
        .actor-card:hover img { transform: scale(1.08); filter: grayscale(0); }
        .admin-controls { display: none; z-index: 100; }
        #adminPanel { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col items-center text-center mb-16 animate__animated animate__fadeIn">
            <div class="w-64 h-64 md:w-80 md:h-80 mb-6">
                <img src="https://i.ibb.co/99XfbWCS/image-3fe3a8.jpg" alt="UnderLight Logo" class="w-full h-full object-contain rounded-full shadow-2xl">
            </div>
            <h1 class="serif-font text-6xl md:text-8xl font-black uppercase shimmer-text italic">UnderLight</h1>
            <p class="text-amber-600 tracking-[0.5em] font-bold text-sm md:text-xl uppercase italic mt-2">Sau Ánh Hào Quang</p>
            
            <div class="mt-12 flex flex-col md:flex-row items-center gap-6 w-full justify-between border-t border-slate-800 pt-10">
                <div class="text-left">
                    <h2 class="text-2xl font-black text-white tracking-widest uppercase italic">DANH SÁCH THÀNH VIÊN</h2>
                    <p class="text-slate-500 code-font text-[10px] mt-1 italic tracking-widest">// Status: Mậu Thân (Hazee)</p>
                </div>
                <button onclick="toggleAdmin()" id="adminBtn" class="bg-amber-900/10 border border-amber-700/50 hover:bg-amber-600 text-amber-500 hover:text-white px-12 py-3 rounded-sm text-[11px] font-black tracking-[0.4em] transition-all uppercase">[ ADMIN ]</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-12">
            <aside id="adminPanel" class="lg:col-span-1">
                <div class="bg-slate-900 border-l-4 border-amber-600 p-6 shadow-2xl sticky top-10 rounded-r-xl">
                    <h2 class="text-amber-500 font-black mb-6 text-xs uppercase tracking-widest flex items-center gap-2"><i class="fas fa-upload"></i> THÊM DIỄN VIÊN</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] text-amber-500 font-bold mb-1 uppercase">Chọn ảnh từ thiết bị</label>
                            <input type="file" id="mFile" accept="image/*" class="w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-amber-900/20 file:text-amber-500 hover:file:bg-amber-900/40 cursor-pointer">
                        </div>
                        <input type="text" id="mName" placeholder="Tên nghệ sĩ..." class="w-full bg-slate-800 border border-slate-700 p-3 rounded text-sm outline-none focus:border-amber-500 text-white">
                        <input type="text" id="mRole" placeholder="Chức vụ/Vai diễn..." class="w-full bg-slate-800 border border-slate-700 p-3 rounded text-sm outline-none focus:border-amber-500 text-white">
                        <textarea id="mBio" placeholder="Giới thiệu nghệ sĩ..." class="w-full bg-slate-800 border border-slate-700 p-3 rounded text-sm h-28 outline-none focus:border-amber-500 text-white"></textarea>
                        <button onclick="uploadAndPush()" id="submitBtn" class="w-full bg-amber-700 hover:bg-amber-600 text-white font-bold py-4 rounded text-[10px] tracking-widest uppercase transition-all shadow-lg active:scale-95">XÁC NHẬN LƯU</button>
                    </div>
                </div>
            </aside>

            <main class="lg:col-span-3">
                <div id="memberContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"></div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase của Hazee để lưu trữ Text
        const firebaseConfig = {
          apiKey: "AIzaSyATKXFYxPhRm_zzfNYrZKkDawvgXAyw9HI",
          authDomain: "source-78e8e.firebaseapp.com",
          projectId: "source-78e8e",
          storageBucket: "source-78e8e.firebasestorage.app",
          messagingSenderId: "174951881154",
          appId: "1:174951881154:web:a962d6d91a0d1c076ade5b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // API Key ImgBB bạn vừa gửi
        const IMGBB_API_KEY = "ee6a9bb3e3a7aa30b463939b8a91a18b";

        onSnapshot(query(collection(db, "club_members"), orderBy("createdAt", "desc")), (snapshot) => {
            const container = document.getElementById('memberContainer');
            container.innerHTML = '';
            snapshot.forEach((item) => {
                const data = item.data();
                const id = item.id;
                container.innerHTML += `
                    <div class="actor-card rounded-2xl overflow-hidden relative group animate__animated animate__fadeInUp">
                        <button onclick="deleteMember('${id}')" class="admin-controls absolute top-4 right-4 bg-red-600 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-red-500 transition-all shadow-xl"><i class="fas fa-trash-alt"></i></button>
                        <div class="h-80 overflow-hidden relative border-b border-slate-800">
                            <img src="${data.image}" class="grayscale transition-all" onerror="this.src='https://via.placeholder.com/300x400?text=Lỗi+Ảnh'">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#05070a] via-transparent opacity-80"></div>
                        </div>
                        <div class="p-6">
                            <span class="text-[8px] font-black tracking-widest text-amber-500 uppercase bg-amber-500/10 px-2 py-1">${data.role}</span>
                            <h3 class="serif-font text-3xl text-white mt-2 mb-2 tracking-tight">${data.name}</h3>
                            <p class="text-slate-400 text-xs italic border-l border-amber-800 pl-3">"${data.bio}"</p>
                        </div>
                    </div>`;
            });
            updateAdminView();
        });

        window.uploadAndPush = async () => {
            const fileInput = document.getElementById('mFile');
            const name = document.getElementById('mName').value;
            const role = document.getElementById('mRole').value;
            const bio = document.getElementById('mBio').value;
            const btn = document.getElementById('submitBtn');

            if(!fileInput.files[0] || !name) return alert("Vui lòng chọn ảnh và nhập tên diễn viên!");
            
            btn.disabled = true;
            btn.innerText = "ĐANG TẢI ẢNH LÊN...";

            try {
                // Tải ảnh lên ImgBB
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);

                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();
                
                if(result.success) {
                    const downloadURL = result.data.url;

                    // Lưu thông tin vào Firestore Database của Hazee
                    await addDoc(collection(db, "club_members"), {
                        name, role, bio, image: downloadURL, createdAt: new Date()
                    });

                    alert("Đã cập nhật sân khấu thành công!");
                    document.getElementById('mFile').value = '';
                    document.getElementById('mName').value = '';
                    document.getElementById('mRole').value = '';
                    document.getElementById('mBio').value = '';
                } else {
                    throw new Error("Lỗi tải ảnh lên server lưu trữ.");
                }
            } catch (e) {
                alert("Lỗi: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "XÁC NHẬN LƯU";
            }
        };

        window.deleteMember = async (id) => { if(confirm("Xóa nghệ sĩ này vĩnh viễn?")) await deleteDoc(doc(db, "club_members", id)); };

        let isAdmin = false;
        window.toggleAdmin = () => {
            if(prompt("Mã DIRECTOR:") === "admin123") {
                isAdmin = true;
                updateAdminView();
                document.getElementById('adminBtn').innerText = "[ DIRECTOR_ONLINE ]";
                document.getElementById('adminBtn').classList.add('bg-amber-700', 'text-white');
            }
        };

        function updateAdminView() {
            document.getElementById('adminPanel').style.display = isAdmin ? 'block' : 'none';
            document.querySelectorAll('.admin-controls').forEach(btn => btn.style.display = isAdmin ? 'flex' : 'none');
        }
    </script>
</body>
</html>
